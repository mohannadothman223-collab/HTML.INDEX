<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" role="img" aria-labelledby="title desc">
  <title id="title">Steak illustration</title>
  <desc id="desc">A stylized illustration of a cooked steak with grill marks and a bone.</desc>
  <defs>
    <linearGradient id="meat" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8d2b18"/>
      <stop offset="100%" stop-color="#bd5a33"/>
    </linearGradient>
    <linearGradient id="bone" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f1e2cb"/>
      <stop offset="100%" stop-color="#d6bd9a"/>
    </linearGradient>
  </defs>
  <rect width="500" height="400" rx="20" fill="#f9e2d0"/>
  <ellipse cx="250" cy="215" rx="185" ry="110" fill="url(#meat)" stroke="#7f260f" stroke-width="12"/>
  <ellipse cx="180" cy="170" rx="50" ry="70" fill="url(#bone)" stroke="#a98b69" stroke-width="8"/>
  <path d="M150 100 C180 90, 220 80, 240 120" fill="none" stroke="#5d170b" stroke-width="12" stroke-linecap="round"/>
  <path d="M190 250 C220 260, 260 270, 290 240" fill="none" stroke="#5d170b" stroke-width="12" stroke-linecap="round"/>
  <path d="M120 210 C140 220, 180 225, 200 205" fill="none" stroke="#5d170b" stroke-width="12" stroke-linecap="round"/>
  <path d="M320 180 C340 195, 360 190, 380 210" fill="none" stroke="#5d170b" stroke-width="12" stroke-linecap="round"/>
</svg>
